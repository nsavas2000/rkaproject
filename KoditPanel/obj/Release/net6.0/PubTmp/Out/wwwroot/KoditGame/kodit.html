<xml xmlns="https://www.w3.org/1999/xhtml" id="toolbox" style="display: none;">
  
  <block type="start"></block>
  <block type="bottom"></block>


  <block type="walk_forward">
    <value name="Value">
      <shadow type="math_number">
        <field name="NUM">1</field>
      </shadow>
    </value>
  </block>

  <block type="turn_left">
    <value name="Value">
      <shadow type="math_number">
        <field name="NUM">90</field>
      </shadow>
    </value>
  </block>

  <block type="turn_right">
    <value name="Value">
      <shadow type="math_number">
        <field name="NUM">90</field>
      </shadow>
    </value>
  </block>


  <block type="whileKodit">
    <value name="Value">
      <shadow type="math_number">
        <field name="NUM">1</field>
      </shadow>
    </value>
  </block>

  <block type="untilKodit">
    <value name="Value">
      <shadow type="text">
        <field name="TXT"></field>
      </shadow>
    </value>
  </block>

  <block type="whileEndKodit"></block>

  <block type="funcKodit">
    <value name="Value">
      <shadow type="text">
        <field name="TXT"></field>
      </shadow>
    </value>
  </block>

  <block type="funcEndKodit"></block>

  <block type="callFuncKodit">
    <value name="Value">
      <shadow type="text">
        <field name="TXT"></field>
      </shadow>
    </value>
  </block>


  <block type="ifKodit">
    <value name="Value">
      <shadow type="text">
        <field name="TXT"></field>
      </shadow>
    </value>
  </block>

  <block type="elseKodit"></block>

  <block type="ifEndKodit"></block>

  <block type="say_kodit">
    <value name="Value">
      <shadow type="text">
        <field name="TXT"></field>
      </shadow>
    </value>
  </block>

  <block type="do_kodit">
    <value name="Value">
      <shadow type="text">
        <field name="TXT"></field>
      </shadow>
    </value>
  </block>

  <block type="do_kodit2">
    <value name="Value">
      <shadow type="text">
        <field name="TXT"></field>
      </shadow>
    </value>
  </block>

</xml>
