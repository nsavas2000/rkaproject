<xml xmlns="https://www.w3.org/1999/xhtml" id="toolbox" style="display: none;">
	<block type="start"></block>
    <block type="control_repeat"> 
       <value name="TIMES"> 
           <shadow type="math_whole_number"> 
               <field name="NUM">4</field> 
           </shadow> 
       </value> 
    </block> 


    <block type="walkForward"> 
       <value name="DURATION">
           <shadow type="math_positive_number"> 
               <field name="NUM">1</field> 
           </shadow> 
       </value> 
    </block> 
    
    <block type="turnLeft"> 
       <value name="DURATION"> 
           <shadow type="math_positive_number"> 
               <field name="NUM">1</field> 
           </shadow> 
       </value> 
    </block> 

    <block type="turnRight"> 
       <value name="DURATION"> 
           <shadow type="math_positive_number"> 
               <field name="NUM">1</field> 
           </shadow> 
       </value> 
    </block> 

	<!--fonsiyon blokları-->
  <block type="fnblock"></block>
  <block type="call_fn"> 
    <value name="DURATION"> 
        <shadow type="math_positive_number"> 
            <field name="NUM">1</field> 
        </shadow> 
    </value> 
  </block> 
</xml>
